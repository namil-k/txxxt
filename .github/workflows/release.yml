name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: txxxt-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: txxxt-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: txxxt-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: txxxt-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libv4l-dev libudev-dev

      - name: Build release binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.name }}
        run: |
          cp "target/${BUILD_TARGET}/release/txxxt" "${ARTIFACT_NAME}"
          chmod +x "${ARTIFACT_NAME}"
          tar czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.name }}
        run: |
          cp "target/${env:BUILD_TARGET}/release/txxxt.exe" "${env:ARTIFACT_NAME}.exe"
          Compress-Archive -Path "${env:ARTIFACT_NAME}.exe" -DestinationPath "${env:ARTIFACT_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            txxxt-macos-arm64.tar.gz
            txxxt-macos-x86_64.tar.gz
            txxxt-linux-x86_64.tar.gz
            txxxt-windows-x86_64.zip
