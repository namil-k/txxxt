<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>txxxt — terminal video call</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    max-width: 720px;
    width: 100%;
    padding: 2rem;
  }
  h1 { font-size: 2rem; color: #fff; margin-bottom: 0.5rem; }
  .subtitle { color: #888; margin-bottom: 2rem; }
  .code-box {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 2rem;
  }
  .code-label { color: #888; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .code { font-size: 3rem; font-weight: bold; color: #00ff88; letter-spacing: 0.3em; }
  .steps {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 1.5rem;
  }
  .steps h2 { font-size: 0.9rem; color: #888; margin-bottom: 1rem; }
  .step { margin-bottom: 1rem; }
  .step:last-child { margin-bottom: 0; }
  .step-label { color: #666; font-size: 0.8rem; margin-bottom: 0.3rem; }
  .cmd {
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    cursor: pointer;
    transition: border-color 0.2s;
    white-space: nowrap;
    overflow-x: auto;
  }
  .cmd:hover { border-color: #00ff88; }
  .cmd code { color: #00ff88; font-size: 0.85rem; flex: 1; min-width: 0; overflow-x: auto; }
  .copy-btn {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    opacity: 0.3;
    transition: opacity 0.2s;
    user-select: none;
  }
  .cmd:hover .copy-btn { opacity: 0.6; }
  .no-code { text-align: center; }
  .no-code h2 { font-size: 1.5rem; color: #fff; margin-bottom: 1rem; }
  .no-code p { color: #888; margin-bottom: 1rem; line-height: 1.6; }
  .links { margin-top: 1.5rem; font-size: 0.8rem; }
  .links a { color: #666; text-decoration: none; transition: color 0.2s; }
  .links a:hover { color: #00ff88; }
  .links span { color: #333; margin: 0 0.5rem; }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Room code page -->
  <div id="room-page" style="display:none">
    <h1>txxxt</h1>
    <p class="subtitle">terminal video call</p>
    <div class="code-box">
      <div class="code-label">room code</div>
      <div class="code" id="room-code"></div>
    </div>
    <div class="steps">
      <h2>join this call</h2>
      <div class="step">
        <div class="step-label">if txxxt is installed:</div>
        <div class="cmd" id="join-cmd">
          <code id="join-cmd-text"></code>
          <svg class="copy-btn" id="join-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </div>
      </div>
      <div class="step">
        <div class="step-label">first time? install first:</div>
        <div class="cmd" id="install-cmd">
          <code id="install-cmd-text"></code>
          <svg class="copy-btn" id="install-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </div>
      </div>
    </div>
    <div class="links">
      <a href="https://github.com/namil-k/txxxt">GitHub</a>
      <span>·</span>
      <a href="https://github.com/namil-k/txxxt/releases">Releases</a>
    </div>
  </div>

  <!-- Landing page -->
  <div id="landing-page" style="display:none">
    <div class="no-code">
      <h2>txxxt</h2>
      <p>ascii webcam viewer &amp; video call<br>in your terminal</p>
      <div class="cmd" id="landing-cmd">
        <code id="landing-cmd-text"></code>
        <svg class="copy-btn" id="landing-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </div>
      <p style="color:#666;font-size:0.8rem;margin-top:1rem;">then run: txxxt</p>
      <div class="links">
        <a href="https://github.com/namil-k/txxxt">GitHub</a>
        <span>·</span>
        <a href="https://github.com/namil-k/txxxt/releases">Releases</a>
      </div>
    </div>
  </div>
</div>

<script>
var INSTALL_CMD = 'curl -fsSL https://raw.githubusercontent.com/namil-k/txxxt/main/install.sh | bash';
var path = window.location.pathname.replace(/^\/+/, '').replace(/\/+$/, '');
var code = (path && /^[A-Za-z0-9]{2,8}$/.test(path)) ? path.toUpperCase() : null;

if (code) {
  document.getElementById('room-page').style.display = 'block';
  document.getElementById('room-code').textContent = code;
  document.getElementById('join-cmd-text').textContent = 'txxxt ' + code;
  document.getElementById('install-cmd-text').textContent = INSTALL_CMD;
  document.getElementById('join-cmd').onclick = function() { copyAndFlash('txxxt ' + code, 'join-icon'); };
  document.getElementById('install-cmd').onclick = function() { copyAndFlash(INSTALL_CMD, 'install-icon'); };
} else {
  document.getElementById('landing-page').style.display = 'block';
  document.getElementById('landing-cmd-text').textContent = INSTALL_CMD;
  document.getElementById('landing-cmd').onclick = function() { copyAndFlash(INSTALL_CMD, 'landing-icon'); };
}

var COPY_SVG = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
var CHECK_SVG = '<path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/>';

function copyAndFlash(text, iconId) {
  navigator.clipboard.writeText(text);
  var el = document.getElementById(iconId);
  el.innerHTML = CHECK_SVG;
  el.style.opacity = '1';
  el.style.stroke = '#00ff88';
  setTimeout(function() {
    el.innerHTML = COPY_SVG;
    el.style.opacity = '';
    el.style.stroke = '';
  }, 1500);
}
</script>
</body>
</html>
